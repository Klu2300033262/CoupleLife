# CoupleLife OS — local development stack
# MongoDB for app data; Redis optional for future caching layer

services:
  mongodb:
    image: mongo:7
    container_name: couplelife-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: couplelife

  redis:
    image: redis:7-alpine
    container_name: couplelife-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles:
      - cache

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: couplelife-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:
